<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">DDIM Sampling Step</text>

  <!-- DDPM vs DDIM -->
  <g data-code-line="1">
    <rect x="50" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="215" y="95" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">DDPM (随机采样)</text>
    <text x="215" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">需要 1000 步</text>
    <text x="215" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">每步添加随机噪声</text>
    <text x="215" y="160" text-anchor="middle" fill="#ef4444" font-size="11">采样慢</text>
  </g>

  <g data-code-line="2,3,4">
    <rect x="420" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="585" y="95" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">DDIM (确定性采样)</text>
    <text x="585" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">可用 50 步</text>
    <text x="585" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">确定性去噪</text>
    <text x="585" y="160" text-anchor="middle" fill="#10b981" font-size="11">采样快 20 倍</text>
  </g>

  <!-- Predict x0 -->
  <g data-code-line="5,6">
    <rect x="100" y="200" width="600" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">步骤 1: 预测干净图像 x₀</text>
    <text x="400" y="250" text-anchor="middle" fill="#cbd5e1" font-size="12">x₀_pred = (x_t - √(1-ᾱ_t) × noise_pred) / √ᾱ_t</text>
    <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-size="11">从噪声图像 x_t 和预测噪声反推原图</text>
    <text x="400" y="290" text-anchor="middle" fill="#10b981" font-size="11">ᾱ_t = alpha_bar_t (累积噪声系数)</text>
  </g>

  <!-- Compute direction -->
  <g data-code-line="7,8">
    <line x1="400" y1="300" x2="400" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="340" width="600" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">步骤 2: 计算噪声方向</text>
    <text x="400" y="390" text-anchor="middle" fill="#cbd5e1" font-size="12">noise_direction = √(1-ᾱ_{t-1}) × noise_pred</text>
    <text x="400" y="410" text-anchor="middle" fill="#94a3b8" font-size="11">指向 x_t 的噪声分量</text>
    <text x="400" y="430" text-anchor="middle" fill="#10b981" font-size="11">ᾱ_{t-1} = alpha_bar_prev (前一步的累积系数)</text>
  </g>

  <!-- Compute x_prev -->
  <g data-code-line="9,10">
    <line x1="400" y1="440" x2="400" y2="470" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="150" y="480" width="500" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="505" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">步骤 3: 合成前一步样本</text>
    <text x="400" y="530" text-anchor="middle" fill="#cbd5e1" font-size="12">x_{t-1} = √ᾱ_{t-1} × x₀_pred + noise_direction</text>
    <text x="400" y="550" text-anchor="middle" fill="#94a3b8" font-size="11">确定性地从 x_t 跳到 x_{t-1}</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="590" width="700" height="90" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="615" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="640" text-anchor="middle" fill="#cbd5e1" font-size="12">跳过中间步骤，直接从 x_t 跳到 x_{t-k}，无需逐步采样</text>
    <text x="400" y="660" text-anchor="middle" fill="#cbd5e1" font-size="12">确定性路径，相同起点总是生成相同结果</text>
  </g>
</svg>
