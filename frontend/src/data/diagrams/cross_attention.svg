<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full h-auto">
  <defs>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Cross-Attention (交叉注意力)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">Q来自decoder，K和V来自encoder</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">连接编码器和解码器的桥梁</text>
  </g>

  <g data-code-line="4,5,6">
    <rect x="100" y="180" width="250" height="80" rx="6" fill="#3b82f6" opacity="0.9"/>
    <text x="225" y="210" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Encoder Output</text>
    <text x="225" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">(源序列表示)</text>
    <text x="225" y="250" text-anchor="middle" fill="#ffffff" font-size="10">"The cat sat"</text>
  </g>

  <g data-code-line="7,8">
    <rect x="450" y="180" width="250" height="80" rx="6" fill="#ef4444" opacity="0.9"/>
    <text x="575" y="210" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Decoder State</text>
    <text x="575" y="230" text-anchor="middle" fill="#cbd5e1" font-size="11">(目标序列表示)</text>
    <text x="575" y="250" text-anchor="middle" fill="#ffffff" font-size="10">"猫坐在"</text>
  </g>

  <g data-code-line="9,10,11">
    <path d="M 225 270 L 225 320 M 575 270 L 575 320" stroke="#64748b" stroke-width="2"/>
    <path d="M 225 320 L 300 350 M 575 320 L 500 350" stroke="#64748b" stroke-width="2"/>

    <rect x="250" y="350" width="300" height="100" rx="6" fill="url(#crossGrad)" opacity="0.9"/>
    <text x="400" y="380" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Cross-Attention</text>
    <text x="400" y="405" text-anchor="middle" fill="#cbd5e1" font-size="12">Q = Decoder × W^Q</text>
    <text x="400" y="425" text-anchor="middle" fill="#cbd5e1" font-size="12">K, V = Encoder × W^K, W^V</text>
  </g>

  <g data-code-line="12,13">
    <path d="M 400 460 L 400 490" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="250" y="490" width="300" height="60" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <text x="400" y="515" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Attention Output</text>
    <text x="400" y="535" text-anchor="middle" fill="#94a3b8" font-size="11">decoder关注encoder的哪些部分</text>
  </g>

  <g data-code-line="14,15,16">
    <rect x="100" y="570" width="600" height="80" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="595" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">应用场景:</text>
    <text x="120" y="620" fill="#cbd5e1" font-size="11">• 机器翻译: decoder生成目标语言时关注源语言</text>
    <text x="120" y="640" fill="#cbd5e1" font-size="11">• 图像描述: decoder生成文本时关注图像特征</text>
  </g>

  <g transform="translate(50, 665)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：decoder用自己的Query去查询encoder的Key-Value，实现跨序列信息交互</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>