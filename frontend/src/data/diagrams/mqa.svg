<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" class="w-full h-auto">
  <defs>
    <linearGradient id="mqaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Multi-Query Attention (MQA)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">多个Query头共享一组Key和Value</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">减少KV Cache显存占用，加速推理</text>
  </g>

  <g data-code-line="4,5,6,7">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Multi-Head Attention (标准):</text>
    <rect x="100" y="190" width="280" height="220" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <rect x="120" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="155" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₁</text>

    <rect x="120" y="270" width="70" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="155" y="300" text-anchor="middle" fill="#ffffff" font-size="11">K₁</text>

    <rect x="120" y="330" width="70" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="155" y="360" text-anchor="middle" fill="#ffffff" font-size="11">V₁</text>

    <rect x="210" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="245" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₂</text>

    <rect x="210" y="270" width="70" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="245" y="300" text-anchor="middle" fill="#ffffff" font-size="11">K₂</text>

    <rect x="210" y="330" width="70" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="245" y="360" text-anchor="middle" fill="#ffffff" font-size="11">V₂</text>

    <rect x="300" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="335" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₈</text>

    <rect x="300" y="270" width="70" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="335" y="300" text-anchor="middle" fill="#ffffff" font-size="11">K₈</text>

    <rect x="300" y="330" width="70" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="335" y="360" text-anchor="middle" fill="#ffffff" font-size="11">V₈</text>

    <text x="265" y="240" text-anchor="middle" fill="#64748b" font-size="14">...</text>
  </g>

  <g data-code-line="8,9,10,11">
    <text x="450" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Multi-Query Attention (MQA):</text>
    <rect x="450" y="190" width="280" height="220" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

    <rect x="470" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="505" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₁</text>

    <rect x="560" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="595" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₂</text>

    <rect x="650" y="210" width="70" height="50" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="685" y="240" text-anchor="middle" fill="#ffffff" font-size="11">Q₈</text>

    <text x="615" y="240" text-anchor="middle" fill="#64748b" font-size="14">...</text>

    <rect x="520" y="290" width="140" height="50" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="590" y="320" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">共享 K</text>

    <rect x="520" y="350" width="140" height="50" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="590" y="380" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">共享 V</text>
  </g>

  <g data-code-line="12,13,14">
    <rect x="100" y="440" width="650" height="120" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="425" y="465" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">显存节省:</text>

    <text x="120" y="490" fill="#cbd5e1" font-size="11">• MHA: KV Cache = 2 × num_heads × seq_len × head_dim</text>
    <text x="120" y="510" fill="#cbd5e1" font-size="11">• MQA: KV Cache = 2 × 1 × seq_len × head_dim</text>
    <text x="120" y="530" fill="#cbd5e1" font-size="11">• 节省比例：num_heads倍 (通常8-32倍)</text>
    <text x="120" y="550" fill="#cbd5e1" font-size="11">• 示例：32头 → 32倍显存节省</text>
  </g>

  <g data-code-line="15,16,17">
    <rect x="100" y="580" width="650" height="80" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="425" y="605" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">权衡:</text>

    <text x="120" y="630" fill="#cbd5e1" font-size="11">• 优点：大幅减少KV Cache，推理速度提升，支持更长上下文</text>
    <text x="120" y="650" fill="#cbd5e1" font-size="11">• 缺点：表达能力略降 (所有头共享K,V)，质量可能下降1-2%</text>
  </g>

  <g transform="translate(50, 685)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：多个Query头共享K,V，牺牲少量质量换取大幅显存节省，PaLM使用</text>
  </g>
</svg>