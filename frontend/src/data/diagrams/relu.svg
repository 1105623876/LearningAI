<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" class="w-full h-auto">
  <defs>
    <linearGradient id="reluGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">ReLU 激活函数</text>

  <!-- Formula -->
  <g data-code-line="1,2">
    <rect x="250" y="60" width="300" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#f1f5f9" font-size="20" font-family="monospace">ReLU(x) = max(0, x)</text>
  </g>

  <!-- Coordinate system -->
  <line x1="100" y1="300" x2="700" y2="300" stroke="#475569" stroke-width="2"/>
  <line x1="400" y1="150" x2="400" y2="350" stroke="#475569" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="680" y="320" fill="#94a3b8" font-size="14">x</text>
  <text x="410" y="170" fill="#94a3b8" font-size="14">y</text>

  <!-- ReLU curve -->
  <g data-code-line="3,4,5">
    <!-- Negative part (zero) -->
    <line x1="100" y1="300" x2="400" y2="300" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,5"/>
    <!-- Positive part (identity) -->
    <line x1="400" y1="300" x2="700" y2="150" stroke="url(#reluGrad)" stroke-width="4"/>
    <!-- Origin point -->
    <circle cx="400" cy="300" r="6" fill="#8b5cf6"/>
  </g>

  <!-- Annotations -->
  <g data-code-line="3">
    <text x="250" y="330" fill="#ef4444" font-size="14">x &lt; 0: 输出 0</text>
  </g>
  <g data-code-line="4,5">
    <text x="550" y="200" fill="#3b82f6" font-size="14">x ≥ 0: 输出 x</text>
  </g>

  <!-- Key properties -->
  <g transform="translate(50, 360)">
    <text x="0" y="0" fill="#94a3b8" font-size="12">特点：简单高效，解决梯度消失，但存在"神经元死亡"问题</text>
  </g>
</svg>