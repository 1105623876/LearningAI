<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="w-full h-auto">
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Label Smoothing</text>
  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#f1f5f9" font-size="16">软化标签，防止过拟合</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">y_smooth = (1-ε)·y_true + ε/K</text>
  </g>
  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Hard Label (原始):</text>
    <rect x="100" y="190" width="250" height="80" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="225" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">[0, 1, 0]</text>
    <text x="225" y="245" text-anchor="middle" fill="#ef4444" font-size="11">过于自信，容易过拟合</text>
  </g>
  <g data-code-line="7,8,9">
    <text x="450" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Smooth Label (ε=0.1):</text>
    <rect x="450" y="190" width="250" height="80" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="575" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">[0.033, 0.933, 0.033]</text>
    <text x="575" y="245" text-anchor="middle" fill="#10b981" font-size="11">更平滑，泛化更好</text>
  </g>
  <g data-code-line="10,11,12">
    <rect x="100" y="300" width="600" height="100" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="325" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">效果:</text>
    <text x="120" y="350" fill="#cbd5e1" font-size="11">• 防止模型过于自信，提升泛化能力</text>
    <text x="120" y="370" fill="#cbd5e1" font-size="11">• 常用ε=0.1，Inception-v3等模型使用</text>
    <text x="120" y="390" fill="#cbd5e1" font-size="11">• 对抗样本鲁棒性提升</text>
  </g>
  <g transform="translate(50, 425)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：软化one-hot标签，给错误类别分配小概率，防止过拟合</text>
  </g>
</svg>