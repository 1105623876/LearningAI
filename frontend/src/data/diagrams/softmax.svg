<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full h-auto">
  <defs>
    <linearGradient id="softmaxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Softmax</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">softmax(x_i) = exp(x_i) / Σ exp(x_j)</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">将任意实数向量转换为概率分布</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">输入 (logits):</text>
    <rect x="100" y="190" width="600" height="60" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" fill="#cbd5e1" font-size="14" font-family="monospace">[2.0, 1.0, 0.1]</text>
  </g>

  <g data-code-line="7,8,9">
    <path d="M 400 260 L 400 290" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="250" y="290" width="300" height="80" rx="6" fill="url(#softmaxGrad)" opacity="0.9"/>
    <text x="400" y="320" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">1. 计算指数</text>
    <text x="400" y="340" text-anchor="middle" fill="#ffffff" font-size="12">exp([2.0, 1.0, 0.1])</text>
    <text x="400" y="360" text-anchor="middle" fill="#cbd5e1" font-size="11">= [7.39, 2.72, 1.11]</text>
  </g>

  <g data-code-line="10,11">
    <path d="M 400 380 L 400 410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="250" y="410" width="300" height="60" rx="6" fill="#8b5cf6" opacity="0.9"/>
    <text x="400" y="435" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">2. 归一化</text>
    <text x="400" y="455" text-anchor="middle" fill="#cbd5e1" font-size="11">除以总和 (7.39 + 2.72 + 1.11 = 11.22)</text>
  </g>

  <g data-code-line="12,13">
    <path d="M 400 480 L 400 510" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="100" y="540" fill="#94a3b8" font-size="14" font-weight="bold">输出 (概率分布):</text>
    <rect x="100" y="550" width="600" height="60" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <text x="400" y="585" text-anchor="middle" fill="#10b981" font-size="14" font-family="monospace">[0.66, 0.24, 0.10]  (总和=1.0)</text>
  </g>

  <g transform="translate(50, 625)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：将任意实数转为概率分布，值越大概率越高，所有概率和为1</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>