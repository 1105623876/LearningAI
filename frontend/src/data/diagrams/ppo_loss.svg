<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full h-auto">
  <defs>
    <linearGradient id="ppoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">PPO (Proximal Policy Optimization)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">限制策略更新幅度，稳定训练</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">RLHF的核心算法</text>
  </g>

  <g data-code-line="4,5,6,7">
    <rect x="100" y="160" width="600" height="120" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="190" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="bold">PPO Clipped Loss:</text>
    <text x="400" y="220" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">L = min(r(θ)·A, clip(r(θ), 1-ε, 1+ε)·A)</text>
    <text x="400" y="245" text-anchor="middle" fill="#94a3b8" font-size="12">r(θ) = π_θ(a|s) / π_old(a|s)  (概率比)</text>
    <text x="400" y="265" text-anchor="middle" fill="#94a3b8" font-size="12">A: advantage，ε: clip范围 (通常0.2)</text>
  </g>

  <g data-code-line="8,9,10">
    <text x="100" y="320" fill="#94a3b8" font-size="14" font-weight="bold">Clipping机制:</text>
    <rect x="100" y="340" width="280" height="180" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <line x1="130" y1="490" x2="350" y2="490" stroke="#475569" stroke-width="1"/>
    <line x1="240" y1="360" x2="240" y2="510" stroke="#475569" stroke-width="1"/>

    <path d="M 130 490 L 200 440 L 240 410 L 280 440 L 350 490" stroke="#ef4444" stroke-width="3"/>

    <line x1="130" y1="430" x2="350" y2="430" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>
    <line x1="130" y1="450" x2="350" y2="450" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4"/>

    <text x="360" y="435" fill="#10b981" font-size="10">1+ε</text>
    <text x="360" y="455" fill="#10b981" font-size="10">1-ε</text>
    <text x="240" y="520" text-anchor="middle" fill="#94a3b8" font-size="10">r(θ)</text>
  </g>

  <g data-code-line="11,12,13">
    <text x="420" y="320" fill="#94a3b8" font-size="14" font-weight="bold">训练流程:</text>
    <rect x="420" y="340" width="280" height="180" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>

    <rect x="440" y="360" width="240" height="30" rx="4" fill="#334155"/>
    <text x="560" y="380" text-anchor="middle" fill="#cbd5e1" font-size="10">1. 用旧策略采样轨迹</text>

    <rect x="440" y="400" width="240" height="30" rx="4" fill="#334155"/>
    <text x="560" y="420" text-anchor="middle" fill="#cbd5e1" font-size="10">2. 计算advantage A</text>

    <rect x="440" y="440" width="240" height="30" rx="4" fill="#334155"/>
    <text x="560" y="460" text-anchor="middle" fill="#cbd5e1" font-size="10">3. 多轮更新新策略</text>

    <rect x="440" y="480" width="240" height="30" rx="4" fill="#334155"/>
    <text x="560" y="500" text-anchor="middle" fill="#cbd5e1" font-size="10">4. 限制更新幅度 (clip)</text>
  </g>

  <g data-code-line="14,15,16">
    <rect x="100" y="540" width="600" height="100" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="565" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">优势:</text>
    <text x="120" y="590" fill="#cbd5e1" font-size="11">• 稳定性: clip防止策略突变，训练更稳定</text>
    <text x="120" y="610" fill="#cbd5e1" font-size="11">• 样本效率: 可重复使用采样数据多轮更新</text>
    <text x="120" y="630" fill="#cbd5e1" font-size="11">• 应用: ChatGPT、Claude等RLHF训练的核心算法</text>
  </g>

  <g transform="translate(50, 665)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：限制策略更新幅度，避免训练崩溃，RLHF的标准算法</text>
  </g>
</svg>