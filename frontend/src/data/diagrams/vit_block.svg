<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="w-full h-auto">
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">ViT Transformer Block</text>
  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#f1f5f9" font-size="16">Patch Embedding + Multi-Head Attention + FFN</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">Vision Transformer的核心模块</text>
  </g>
  <g data-code-line="4,5">
    <rect x="300" y="160" width="200" height="50" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="190" text-anchor="middle" fill="#e2e8f0" font-size="14">Patch Embeddings + [CLS]</text>
  </g>
  <g data-code-line="6,7,8">
    <path d="M 400 220 L 400 250" stroke="#64748b" stroke-width="2"/>
    <rect x="250" y="250" width="300" height="80" rx="6" fill="#3b82f6" opacity="0.9"/>
    <text x="400" y="285" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Multi-Head Self-Attention</text>
    <text x="400" y="310" text-anchor="middle" fill="#cbd5e1" font-size="11">全局关注所有patches</text>
  </g>
  <g data-code-line="9,10">
    <path d="M 400 340 L 400 370" stroke="#64748b" stroke-width="2"/>
    <rect x="250" y="370" width="300" height="60" rx="6" fill="#8b5cf6" opacity="0.9"/>
    <text x="400" y="405" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Feed-Forward Network</text>
  </g>
  <g data-code-line="11,12">
    <path d="M 400 440 L 400 470" stroke="#64748b" stroke-width="2"/>
    <rect x="300" y="470" width="200" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <text x="400" y="500" text-anchor="middle" fill="#10b981" font-size="14">Output</text>
  </g>
  <g transform="translate(50, 545)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：将图像patches视为序列，用Transformer处理，无需卷积</text>
  </g>
</svg>