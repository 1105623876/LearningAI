<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" class="w-full h-auto">
  <defs>
    <linearGradient id="head1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="head2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="head3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="head4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Multi-Head Attention</text>

  <!-- Formula -->
  <g data-code-line="1,2,3">
    <rect x="150" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="450" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">MultiHead(Q,K,V) = Concat(head₁,...,headₕ)W^O</text>
    <text x="450" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">headᵢ = Attention(QWᵢ^Q, KWᵢ^K, VWᵢ^V)</text>
  </g>

  <!-- Input -->
  <g data-code-line="4,5,6">
    <rect x="350" y="160" width="200" height="50" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="450" y="190" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Input (d_model=512)</text>
  </g>

  <!-- Linear projections -->
  <g data-code-line="7,8,9">
    <path d="M 450 220 L 450 250" stroke="#64748b" stroke-width="2"/>
    <rect x="300" y="250" width="300" height="40" rx="6" fill="#334155" opacity="0.9"/>
    <text x="450" y="275" text-anchor="middle" fill="#cbd5e1" font-size="13">Linear Projections (W^Q, W^K, W^V)</text>
  </g>

  <!-- Split into heads -->
  <g data-code-line="10,11,12">
    <path d="M 300 300 L 150 330 M 400 300 L 300 330 M 500 300 L 600 330 M 600 300 L 750 330"
          stroke="#64748b" stroke-width="2"/>

    <text x="450" y="320" text-anchor="middle" fill="#94a3b8" font-size="12">拆分为 h=8 个头，每头 d_k=64</text>

    <!-- Head 1 -->
    <rect x="75" y="330" width="150" height="80" rx="6" fill="url(#head1)" opacity="0.9"/>
    <text x="150" y="360" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Head 1</text>
    <text x="150" y="380" text-anchor="middle" fill="#ffffff" font-size="11">Attention</text>
    <text x="150" y="395" text-anchor="middle" fill="#ffffff" font-size="10">(seq_len, 64)</text>

    <!-- Head 2 -->
    <rect x="250" y="330" width="150" height="80" rx="6" fill="url(#head2)" opacity="0.9"/>
    <text x="325" y="360" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Head 2</text>
    <text x="325" y="380" text-anchor="middle" fill="#ffffff" font-size="11">Attention</text>
    <text x="325" y="395" text-anchor="middle" fill="#ffffff" font-size="10">(seq_len, 64)</text>

    <!-- Head 3 -->
    <rect x="525" y="330" width="150" height="80" rx="6" fill="url(#head3)" opacity="0.9"/>
    <text x="600" y="360" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Head 3</text>
    <text x="600" y="380" text-anchor="middle" fill="#ffffff" font-size="11">Attention</text>
    <text x="600" y="395" text-anchor="middle" fill="#ffffff" font-size="10">(seq_len, 64)</text>

    <!-- Head 4 (... more) -->
    <rect x="700" y="330" width="150" height="80" rx="6" fill="url(#head4)" opacity="0.9"/>
    <text x="775" y="360" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Head 8</text>
    <text x="775" y="380" text-anchor="middle" fill="#ffffff" font-size="11">Attention</text>
    <text x="775" y="395" text-anchor="middle" fill="#ffffff" font-size="10">(seq_len, 64)</text>

    <text x="450" y="370" text-anchor="middle" fill="#64748b" font-size="16">...</text>
  </g>

  <!-- Attention details for one head -->
  <g data-code-line="13,14,15">
    <rect x="50" y="440" width="200" height="100" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1" opacity="0.8"/>
    <text x="150" y="460" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="bold">每个头独立计算:</text>
    <text x="150" y="480" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="monospace">Q₁ = XW₁^Q</text>
    <text x="150" y="495" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="monospace">K₁ = XW₁^K</text>
    <text x="150" y="510" text-anchor="middle" fill="#cbd5e1" font-size="10" font-family="monospace">V₁ = XW₁^V</text>
    <text x="150" y="530" text-anchor="middle" fill="#94a3b8" font-size="10">关注不同子空间</text>
  </g>

  <!-- Concatenation -->
  <g data-code-line="16,17">
    <path d="M 150 420 L 150 560 M 325 420 L 325 560 M 600 420 L 600 560 M 775 420 L 775 560"
          stroke="#64748b" stroke-width="2"/>
    <path d="M 150 560 L 450 590 M 325 560 L 450 590 M 600 560 L 450 590 M 775 560 L 450 590"
          stroke="#64748b" stroke-width="2"/>

    <rect x="300" y="590" width="300" height="50" rx="6" fill="#334155" opacity="0.9"/>
    <text x="450" y="620" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">Concat (8×64 = 512)</text>
  </g>

  <!-- Output projection -->
  <g data-code-line="18,19">
    <path d="M 450 650 L 450 680" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="350" y="680" width="200" height="50" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="3"/>
    <text x="450" y="710" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="bold">Output W^O</text>
  </g>

  <!-- Key insight -->
  <g transform="translate(50, 745)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：多个头并行关注不同表示子空间，捕获更丰富的特征</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>