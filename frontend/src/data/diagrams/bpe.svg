<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Byte-Pair Encoding (BPE)</text>

  <!-- Initial text -->
  <g data-code-line="1">
    <rect x="100" y="70" width="600" height="60" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">输入文本</text>
    <text x="400" y="115" text-anchor="middle" fill="#cbd5e1" font-size="13" font-family="monospace">"low</w> lower</w> newest</w>"</text>
  </g>

  <!-- Step 1: Character split -->
  <g data-code-line="2,3">
    <line x1="400" y1="130" x2="400" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="170" width="600" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="195" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">步骤 1: 字符级分割</text>
    <text x="400" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="monospace">l o w </w>   l o w e r </w>   n e w e s t </w></text>
    <text x="400" y="240" text-anchor="middle" fill="#94a3b8" font-size="11">每个字符是一个 token，</w> 标记词边界</text>
  </g>

  <!-- Step 2: Find most frequent pair -->
  <g data-code-line="4,5">
    <line x1="400" y1="250" x2="400" y2="280" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="290" width="600" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="315" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">步骤 2: 统计相邻对频率</text>
    <text x="400" y="340" text-anchor="middle" fill="#cbd5e1" font-size="12">('e', 'r'): 1次   ('e', 's'): 1次   ('e', 'w'): 2次 ← 最高频</text>
    <text x="400" y="360" text-anchor="middle" fill="#cbd5e1" font-size="12">('l', 'o'): 2次   ('o', 'w'): 2次   ('s', 't'): 1次</text>
    <text x="400" y="380" text-anchor="middle" fill="#10b981" font-size="11" font-weight="bold">合并最高频对: 'e' + 'w' → 'ew'</text>
  </g>

  <!-- Step 3: Merge -->
  <g data-code-line="6,7">
    <line x1="400" y1="390" x2="400" y2="420" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="430" width="600" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="455" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">步骤 3: 应用合并</text>
    <text x="400" y="480" text-anchor="middle" fill="#cbd5e1" font-size="12" font-family="monospace">l o w </w>   l o w e r </w>   n ew e s t </w></text>
    <text x="400" y="500" text-anchor="middle" fill="#94a3b8" font-size="11">'e' 和 'w' 合并为 'ew'</text>
  </g>

  <!-- Repeat -->
  <g data-code-line="8">
    <line x1="400" y1="510" x2="400" y2="540" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="550" width="600" height="80" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <text x="400" y="575" text-anchor="middle" fill="#ec4899" font-size="14" font-weight="bold">重复 num_merges 次</text>
    <text x="400" y="600" text-anchor="middle" fill="#cbd5e1" font-size="12">继续找最高频对并合并，逐步构建子词词表</text>
    <text x="400" y="620" text-anchor="middle" fill="#94a3b8" font-size="11">例: 'l'+'o'→'lo', 'lo'+'w'→'low', 'ew'+'est'→'ewest'</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="660" width="700" height="70" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="685" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="710" text-anchor="middle" fill="#cbd5e1" font-size="12">从字符级开始，迭代合并高频相邻对，平衡词表大小和覆盖率</text>
  </g>
</svg>
