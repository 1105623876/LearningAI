<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="w-full h-auto">
  <defs>
    <linearGradient id="lnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Layer Normalization</text>

  <!-- Formula -->
  <g data-code-line="1,2,3,4">
    <rect x="100" y="60" width="600" height="90" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">LN(x) = γ · (x - μ) / √(σ² + ε) + β</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">μ = mean(x),  σ² = var(x)</text>
    <text x="400" y="135" text-anchor="middle" fill="#94a3b8" font-size="13">γ (scale) 和 β (shift) 是可学习参数</text>
  </g>

  <!-- Input tensor visualization -->
  <g data-code-line="5,6">
    <text x="150" y="190" fill="#94a3b8" font-size="14" font-weight="bold">输入特征 (batch_size, seq_len, hidden_dim)</text>
    <rect x="150" y="200" width="500" height="80" rx="4" fill="#1e293b" stroke="#475569" stroke-width="2"/>

    <!-- Sample values -->
    <text x="170" y="230" fill="#64748b" font-size="12" font-family="monospace">[2.1, -0.5, 1.3, 0.8, ...]</text>
    <text x="170" y="250" fill="#64748b" font-size="12" font-family="monospace">[1.5,  0.9, -1.1, 2.0, ...]</text>
    <text x="170" y="270" fill="#64748b" font-size="12" font-family="monospace">[0.3, -0.8,  1.7, 0.5, ...]</text>
  </g>

  <!-- Normalization process -->
  <g data-code-line="7,8,9">
    <path d="M 400 290 L 400 320" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <rect x="300" y="320" width="200" height="40" rx="6" fill="url(#lnGrad)" opacity="0.8"/>
    <text x="400" y="345" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">归一化 (按特征维度)</text>
  </g>

  <!-- Output tensor -->
  <g data-code-line="10,11">
    <path d="M 400 370 L 400 400" stroke="#8b5cf6" stroke-width="3" marker-end="url(#arrowhead)"/>
    <text x="150" y="420" fill="#94a3b8" font-size="14" font-weight="bold">输出 (均值≈0, 方差≈1)</text>
    <rect x="150" y="430" width="500" height="80" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="3"/>

    <text x="170" y="460" fill="#10b981" font-size="12" font-family="monospace">[ 0.8, -1.2,  0.3,  0.1, ...]</text>
    <text x="170" y="480" fill="#10b981" font-size="12" font-family="monospace">[ 0.5,  0.2, -0.9,  1.2, ...]</text>
    <text x="170" y="500" fill="#10b981" font-size="12" font-family="monospace">[-0.3, -1.0,  0.9,  0.4, ...]</text>
  </g>

  <!-- Key points -->
  <g transform="translate(50, 540)">
    <text x="0" y="0" fill="#94a3b8" font-size="12">特点：对每个样本独立归一化，不依赖 batch，适合 NLP 任务</text>
  </g>
  <g transform="translate(50, 560)">
    <text x="0" y="0" fill="#64748b" font-size="11">对比 Batch Norm：LayerNorm 按特征维度归一化，BatchNorm 按 batch 维度</text>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8b5cf6" />
    </marker>
  </defs>
</svg>