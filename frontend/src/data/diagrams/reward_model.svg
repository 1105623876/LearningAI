<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="w-full h-auto">
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Reward Model (Bradley-Terry)</text>
  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#f1f5f9" font-size="16">学习人类偏好，为RLHF提供奖励信号</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">P(y_w > y_l) = σ(r(y_w) - r(y_l))</text>
  </g>
  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">训练数据 (偏好对):</text>
    <rect x="100" y="190" width="600" height="120" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">Prompt: "解释相对论"</text>
    <rect x="120" y="240" width="560" height="25" rx="4" fill="#10b981" opacity="0.3"/>
    <text x="400" y="257" text-anchor="middle" fill="#10b981" font-size="10">✓ 偏好: 详细准确的解释</text>
    <rect x="120" y="275" width="560" height="25" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="400" y="292" text-anchor="middle" fill="#ef4444" font-size="10">✗ 非偏好: 简短不准确的回答</text>
  </g>
  <g data-code-line="7,8,9">
    <rect x="100" y="330" width="600" height="80" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="355" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">Loss:</text>
    <text x="400" y="380" text-anchor="middle" fill="#f1f5f9" font-size="14" font-family="monospace">L = -log σ(r(y_w) - r(y_l))</text>
    <text x="400" y="400" text-anchor="middle" fill="#94a3b8" font-size="11">鼓励偏好回答得分高于非偏好回答</text>
  </g>
  <g transform="translate(50, 435)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：从偏好对学习奖励函数，为RLHF提供标量奖励信号</text>
  </g>
</svg>