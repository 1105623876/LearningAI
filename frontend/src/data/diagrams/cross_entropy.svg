<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="w-full h-auto">
  <defs>
    <linearGradient id="ceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Cross-Entropy Loss</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">L = -Σ y_true · log(y_pred)</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">衡量预测分布与真实分布的差异</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">示例 (3分类):</text>

    <rect x="100" y="190" width="280" height="100" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="240" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="bold">真实标签 (one-hot)</text>
    <text x="240" y="240" text-anchor="middle" fill="#10b981" font-size="14" font-family="monospace">[0, 1, 0]</text>
    <text x="240" y="265" text-anchor="middle" fill="#94a3b8" font-size="11">类别2是正确答案</text>

    <rect x="420" y="190" width="280" height="100" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="560" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="bold">模型预测 (softmax)</text>
    <text x="560" y="240" text-anchor="middle" fill="#3b82f6" font-size="14" font-family="monospace">[0.1, 0.7, 0.2]</text>
    <text x="560" y="265" text-anchor="middle" fill="#94a3b8" font-size="11">预测类别2概率70%</text>
  </g>

  <g data-code-line="7,8,9">
    <path d="M 400 300 L 400 330" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="200" y="330" width="400" height="100" rx="6" fill="url(#ceGrad)" opacity="0.9"/>
    <text x="400" y="360" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">计算交叉熵</text>
    <text x="400" y="385" text-anchor="middle" fill="#cbd5e1" font-size="12">L = -(0×log(0.1) + 1×log(0.7) + 0×log(0.2))</text>
    <text x="400" y="410" text-anchor="middle" fill="#cbd5e1" font-size="12">= -log(0.7) ≈ 0.357</text>
  </g>

  <g data-code-line="10,11">
    <path d="M 400 440 L 400 470" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="470" width="200" height="50" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
    <text x="400" y="500" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">Loss = 0.357</text>
  </g>

  <g data-code-line="12,13,14">
    <rect x="100" y="540" width="600" height="60" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="565" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">特点:</text>
    <text x="400" y="585" text-anchor="middle" fill="#cbd5e1" font-size="11">预测越准确，loss越小；预测错误类别，loss趋向无穷大</text>
  </g>

  <g transform="translate(50, 615)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：分类任务的标准损失函数，鼓励模型输出正确类别的高概率</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>