<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Linear Regression (Closed-Form Solution)</text>

  <!-- Problem setup -->
  <g data-code-line="1,2">
    <rect x="100" y="70" width="600" height="80" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">问题设定</text>
    <text x="400" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">给定: X (N, D), y (N,)</text>
    <text x="400" y="140" text-anchor="middle" fill="#cbd5e1" font-size="12">求: θ 使得 ||Xθ - y||² 最小</text>
  </g>

  <!-- Augment X -->
  <g data-code-line="3,4">
    <line x1="400" y1="150" x2="400" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="190" width="600" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="215" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">步骤 1: 增广矩阵</text>
    <text x="400" y="240" text-anchor="middle" fill="#cbd5e1" font-size="12">X_aug = [X, ones(N, 1)]</text>
    <text x="400" y="260" text-anchor="middle" fill="#94a3b8" font-size="11">Shape: (N, D+1) - 添加偏置列</text>
  </g>

  <!-- Normal equation -->
  <g data-code-line="5,6">
    <line x1="400" y1="270" x2="400" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="310" width="600" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="335" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">步骤 2: 正规方程</text>
    <text x="400" y="360" text-anchor="middle" fill="#cbd5e1" font-size="12">(X_aug^T X_aug) θ = X_aug^T y</text>
    <text x="400" y="380" text-anchor="middle" fill="#94a3b8" font-size="11">最小二乘法的解析解</text>
    <text x="400" y="400" text-anchor="middle" fill="#10b981" font-size="11">θ = (X_aug^T X_aug)^(-1) X_aug^T y</text>
  </g>

  <!-- Solve -->
  <g data-code-line="7,8">
    <line x1="400" y1="410" x2="400" y2="440" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="150" y="450" width="500" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="475" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">步骤 3: 求解线性系统</text>
    <text x="400" y="500" text-anchor="middle" fill="#cbd5e1" font-size="12">θ = torch.linalg.lstsq(X_aug, y)</text>
    <text x="400" y="520" text-anchor="middle" fill="#94a3b8" font-size="11">数值稳定的最小二乘求解器</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="560" width="700" height="70" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="585" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="610" text-anchor="middle" fill="#cbd5e1" font-size="12">通过正规方程直接求解最优参数，无需迭代优化</text>
  </g>
</svg>
