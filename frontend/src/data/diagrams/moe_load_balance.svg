<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">MoE Load Balancing Loss</text>

  <!-- Problem -->
  <g data-code-line="1">
    <rect x="100" y="70" width="600" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">问题：专家负载不均</text>
    <text x="400" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">某些专家处理大量 token，其他专家闲置</text>
    <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">导致计算资源浪费和训练不稳定</text>
    <text x="400" y="160" text-anchor="middle" fill="#ef4444" font-size="11">例如: 专家 0 处理 80% token，专家 1-7 各 2.5%</text>
  </g>

  <!-- Router logits -->
  <g data-code-line="2,3">
    <line x1="400" y1="170" x2="400" y2="200" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="210" width="600" height="80" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="235" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">路由器输出</text>
    <text x="400" y="260" text-anchor="middle" fill="#cbd5e1" font-size="12">router_logits: (N, num_experts)</text>
    <text x="400" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">每个 token 对每个专家的偏好分数</text>
  </g>

  <!-- Compute f_i -->
  <g data-code-line="4,5">
    <line x1="400" y1="290" x2="400" y2="320" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="330" width="600" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="355" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">步骤 1: 计算专家负载 f_i</text>
    <text x="400" y="380" text-anchor="middle" fill="#cbd5e1" font-size="12">assignments = argmax(router_logits)</text>
    <text x="400" y="400" text-anchor="middle" fill="#cbd5e1" font-size="12">f_i = (分配给专家 i 的 token 数) / N</text>
    <text x="400" y="420" text-anchor="middle" fill="#94a3b8" font-size="11">f_i ∈ [0, 1], Σf_i = 1</text>
  </g>

  <!-- Compute P_i -->
  <g data-code-line="6,7">
    <line x1="400" y1="430" x2="400" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="470" width="600" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="495" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">步骤 2: 计算路由概率 P_i</text>
    <text x="400" y="520" text-anchor="middle" fill="#cbd5e1" font-size="12">P_i = softmax(router_logits)[:, i].mean()</text>
    <text x="400" y="540" text-anchor="middle" fill="#94a3b8" font-size="11">专家 i 的平均路由概率</text>
    <text x="400" y="560" text-anchor="middle" fill="#10b981" font-size="11">可微分，可以反向传播</text>
  </g>

  <!-- Loss -->
  <g data-code-line="8">
    <line x1="400" y1="570" x2="400" y2="600" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="150" y="610" width="500" height="60" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="635" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">负载均衡损失</text>
    <text x="400" y="655" text-anchor="middle" fill="#cbd5e1" font-size="12">L = num_experts × Σ(f_i × P_i)</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="690" width="700" height="80" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="715" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="740" text-anchor="middle" fill="#cbd5e1" font-size="12">惩罚负载高且概率高的专家，鼓励路由器分散 token</text>
  </g>
</svg>
