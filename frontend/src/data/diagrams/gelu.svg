<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="w-full h-auto">
  <defs>
    <linearGradient id="geluGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">GELU 激活函数</text>

  <g data-code-line="1,2,3">
    <rect x="150" y="60" width="500" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">GELU(x) = x · Φ(x)</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="14">Φ(x) 是标准正态分布的累积分布函数</text>
  </g>

  <line x1="100" y1="320" x2="700" y2="320" stroke="#475569" stroke-width="2"/>
  <line x1="400" y1="170" x2="400" y2="420" stroke="#475569" stroke-width="2"/>

  <text x="680" y="340" fill="#94a3b8" font-size="14">x</text>
  <text x="410" y="190" fill="#94a3b8" font-size="14">y</text>

  <g data-code-line="4,5,6,7">
    <path d="M 100 320 Q 250 325 300 318 T 400 300 T 500 250 T 700 180"
          stroke="url(#geluGrad)" stroke-width="4" fill="none"/>
  </g>

  <g data-code-line="4,5">
    <circle cx="250" cy="322" r="5" fill="#ef4444"/>
    <text x="250" y="350" text-anchor="middle" fill="#ef4444" font-size="13">负值区域：接近0但非0</text>
  </g>

  <g data-code-line="6,7">
    <circle cx="550" cy="220" r="5" fill="#10b981"/>
    <text x="550" y="200" text-anchor="middle" fill="#10b981" font-size="13">正值区域：近似线性</text>
  </g>

  <g transform="translate(50, 450)">
    <text x="0" y="0" fill="#94a3b8" font-size="12">特点：平滑、可微、保留负值信息，GPT/BERT 常用</text>
  </g>

  <g transform="translate(50, 470)">
    <text x="0" y="0" fill="#64748b" font-size="11">对比 ReLU：负值不直接归零，梯度更平滑</text>
  </g>
</svg>