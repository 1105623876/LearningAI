<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" class="w-full h-auto">
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Activation Checkpointing</text>
  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#f1f5f9" font-size="16">用时间换空间，重计算激活值</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">减少显存占用，支持更大batch或更深网络</text>
  </g>
  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">标准反向传播:</text>
    <rect x="100" y="190" width="280" height="100" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="240" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">存储所有中间激活值</text>
    <text x="240" y="245" text-anchor="middle" fill="#ef4444" font-size="11">显存占用大</text>
    <text x="240" y="265" text-anchor="middle" fill="#ef4444" font-size="11">O(n)显存</text>
  </g>
  <g data-code-line="7,8,9">
    <text x="420" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Activation Checkpointing:</text>
    <rect x="420" y="190" width="280" height="100" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="560" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">只存储checkpoint点</text>
    <text x="560" y="245" text-anchor="middle" fill="#10b981" font-size="11">反向时重计算</text>
    <text x="560" y="265" text-anchor="middle" fill="#10b981" font-size="11">O(√n)显存</text>
  </g>
  <g data-code-line="10,11,12">
    <rect x="100" y="310" width="600" height="100" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="335" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">权衡:</text>
    <text x="120" y="360" fill="#cbd5e1" font-size="11">• 显存: 减少50-80%</text>
    <text x="120" y="380" fill="#cbd5e1" font-size="11">• 时间: 增加20-30% (重计算开销)</text>
    <text x="120" y="400" fill="#cbd5e1" font-size="11">• 应用: 训练超大模型，PyTorch torch.utils.checkpoint</text>
  </g>
  <g transform="translate(50, 435)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：不存储所有激活值，反向传播时重新计算，用时间换显存</text>
  </g>
</svg>