<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">QLoRA (Quantized Low-Rank Adaptation)</text>

  <!-- Standard LoRA -->
  <g data-code-line="1">
    <rect x="50" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="215" y="95" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">标准 LoRA</text>
    <text x="215" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">W (fp32) + ΔW = A×B (fp32)</text>
    <text x="215" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">基础权重全精度存储</text>
    <text x="215" y="160" text-anchor="middle" fill="#ef4444" font-size="11">显存占用较高</text>
  </g>

  <!-- QLoRA -->
  <g data-code-line="2,3,4">
    <rect x="420" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="585" y="95" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">QLoRA</text>
    <text x="585" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">W (int8) + ΔW = A×B (fp32)</text>
    <text x="585" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">基础权重量化为 int8</text>
    <text x="585" y="160" text-anchor="middle" fill="#10b981" font-size="11">显存节省 4 倍</text>
  </g>

  <!-- Quantized Weight -->
  <g data-code-line="5,6">
    <rect x="100" y="200" width="600" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">量化权重存储</text>
    <text x="400" y="250" text-anchor="middle" fill="#cbd5e1" font-size="12">quantized_weight: (out_features, in_features) int8</text>
    <text x="400" y="270" text-anchor="middle" fill="#cbd5e1" font-size="12">scale: (out_features, 1) fp32</text>
    <text x="400" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">W_dequant = quantized_weight.float() × scale</text>
  </g>

  <!-- LoRA adapters -->
  <g data-code-line="7,8">
    <line x1="400" y1="300" x2="400" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="340" width="600" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">LoRA 低秩适配器</text>
    <text x="400" y="390" text-anchor="middle" fill="#cbd5e1" font-size="12">lora_A: (rank, in_features) fp32 - 可训练</text>
    <text x="400" y="410" text-anchor="middle" fill="#cbd5e1" font-size="12">lora_B: (out_features, rank) fp32 - 可训练</text>
    <text x="400" y="430" text-anchor="middle" fill="#10b981" font-size="11">ΔW = (lora_B @ lora_A) × (alpha / rank)</text>
  </g>

  <!-- Forward pass -->
  <g data-code-line="9,10,11">
    <line x1="400" y1="440" x2="400" y2="470" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="480" width="600" height="120" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="505" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">前向传播</text>
    <text x="400" y="530" text-anchor="middle" fill="#cbd5e1" font-size="12">1. base_out = x @ W_dequant.T</text>
    <text x="400" y="550" text-anchor="middle" fill="#cbd5e1" font-size="12">2. lora_out = (x @ lora_A.T) @ lora_B.T × (alpha/rank)</text>
    <text x="400" y="570" text-anchor="middle" fill="#cbd5e1" font-size="12">3. output = base_out + lora_out</text>
    <text x="400" y="590" text-anchor="middle" fill="#94a3b8" font-size="11">只有 LoRA 参数参与梯度更新</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="630" width="700" height="100" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="655" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="680" text-anchor="middle" fill="#cbd5e1" font-size="12">基础权重量化为 int8 冻结，只训练 fp32 的低秩适配器</text>
    <text x="400" y="700" text-anchor="middle" fill="#cbd5e1" font-size="12">在保持全精度微调效果的同时，大幅降低显存占用</text>
  </g>
</svg>
