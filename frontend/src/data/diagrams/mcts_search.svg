<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">MCTS (Monte Carlo Tree Search) for Reasoning</text>

  <!-- UCB1 formula -->
  <g data-code-line="1,2,3">
    <rect x="100" y="70" width="600" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="95" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">UCB1 选择公式</text>
    <text x="400" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">UCB = value + c_puct × √(ln(parent_visits) / visit_count)</text>
    <text x="400" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">平衡利用(value)和探索(√...)</text>
    <text x="400" y="160" text-anchor="middle" fill="#10b981" font-size="11">c_puct=1.414 控制探索强度</text>
  </g>

  <!-- Exploitation -->
  <g data-code-line="4">
    <line x1="300" y1="170" x2="250" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="50" y="220" width="300" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="200" y="245" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">利用项 (Exploitation)</text>
    <text x="200" y="270" text-anchor="middle" fill="#cbd5e1" font-size="12">value: 平均奖励</text>
    <text x="200" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">访问多的高价值节点</text>
    <text x="200" y="310" text-anchor="middle" fill="#10b981" font-size="11">已知好的路径</text>
  </g>

  <!-- Exploration -->
  <g data-code-line="5">
    <line x1="500" y1="170" x2="550" y2="210" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="450" y="220" width="300" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="600" y="245" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">探索项 (Exploration)</text>
    <text x="600" y="270" text-anchor="middle" fill="#cbd5e1" font-size="12">√(ln(parent) / visits)</text>
    <text x="600" y="290" text-anchor="middle" fill="#94a3b8" font-size="11">访问少的节点</text>
    <text x="600" y="310" text-anchor="middle" fill="#10b981" font-size="11">未知的潜在路径</text>
  </g>

  <!-- Selection -->
  <g data-code-line="6,7">
    <line x1="400" y1="320" x2="400" y2="360" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="150" y="370" width="500" height="80" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="395" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">选择动作</text>
    <text x="400" y="420" text-anchor="middle" fill="#cbd5e1" font-size="12">selected_idx = argmax(UCB)</text>
    <text x="400" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">选择 UCB 分数最高的子节点</text>
  </g>

  <!-- Simulation -->
  <g data-code-line="8">
    <line x1="400" y1="450" x2="400" y2="480" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="200" y="490" width="400" height="60" rx="8" fill="#1e293b" stroke="#ec4899" stroke-width="2"/>
    <text x="400" y="515" text-anchor="middle" fill="#ec4899" font-size="14" font-weight="bold">模拟 (Rollout)</text>
    <text x="400" y="535" text-anchor="middle" fill="#cbd5e1" font-size="12">随机或启发式完成推理，获得奖励</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="570" width="700" height="70" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="595" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="615" text-anchor="middle" fill="#cbd5e1" font-size="12">用 UCB1 平衡探索和利用，逐步构建推理树</text>
    <text x="400" y="635" text-anchor="middle" fill="#cbd5e1" font-size="12">适用于 LLM 推理、数学证明等需要搜索的任务</text>
  </g>
</svg>
