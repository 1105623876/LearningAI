<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" class="w-full h-auto">
  <defs>
    <linearGradient id="gqaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Grouped-Query Attention (GQA)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">Query头分组，每组共享一组K,V</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">MHA和MQA的折中方案</text>
  </g>

  <g data-code-line="4,5,6,7">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">GQA示例 (8头Query, 2组KV):</text>
    <rect x="100" y="190" width="650" height="280" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>

    <text x="425" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="bold">Group 1</text>
    <rect x="120" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="150" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₁</text>

    <rect x="190" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="220" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₂</text>

    <rect x="260" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="290" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₃</text>

    <rect x="330" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="360" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₄</text>

    <rect x="180" y="290" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="250" y="315" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">共享 K₁</text>

    <rect x="180" y="340" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="250" y="365" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">共享 V₁</text>

    <text x="550" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="bold">Group 2</text>
    <rect x="430" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="460" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₅</text>

    <rect x="500" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="530" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₆</text>

    <rect x="570" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="600" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₇</text>

    <rect x="640" y="230" width="60" height="40" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="670" y="255" text-anchor="middle" fill="#ffffff" font-size="10">Q₈</text>

    <rect x="490" y="290" width="140" height="40" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="560" y="315" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">共享 K₂</text>

    <rect x="490" y="340" width="140" height="40" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="560" y="365" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold">共享 V₂</text>

    <text x="425" y="420" text-anchor="middle" fill="#94a3b8" font-size="11">每组4个Query头共享1组K,V</text>
    <text x="425" y="440" text-anchor="middle" fill="#94a3b8" font-size="11">总共2组KV，而非8组(MHA)或1组(MQA)</text>
  </g>

  <g data-code-line="8,9,10,11">
    <rect x="100" y="490" width="650" height="100" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="425" y="515" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">性能对比:</text>

    <text x="120" y="540" fill="#cbd5e1" font-size="11">• MHA (8头): KV Cache = 8组，质量最高，显存最大</text>
    <text x="120" y="560" fill="#cbd5e1" font-size="11">• GQA (2组): KV Cache = 2组，质量接近MHA，显存节省4倍</text>
    <text x="120" y="580" fill="#cbd5e1" font-size="11">• MQA (1组): KV Cache = 1组，质量略降，显存节省8倍</text>
  </g>

  <g data-code-line="12,13,14">
    <rect x="100" y="610" width="650" height="60" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="425" y="635" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">应用:</text>

    <text x="120" y="660" fill="#cbd5e1" font-size="11">• LLaMA-2: 使用GQA，平衡质量和效率</text>
  </g>

  <g transform="translate(50, 685)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：MHA和MQA的折中，分组共享K,V，兼顾质量和效率</text>
  </g>
</svg>