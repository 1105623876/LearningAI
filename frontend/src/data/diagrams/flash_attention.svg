<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" class="w-full h-auto">
  <defs>
    <linearGradient id="flashGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Flash Attention</text>

  <g data-code-line="1,2,3">
    <rect x="150" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="450" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">分块计算 + 在线Softmax，减少HBM访问</text>
    <text x="450" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">IO复杂度从 O(N²) 降至 O(N²/M)，M是SRAM块大小</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">标准Attention (慢):</text>
    <rect x="100" y="190" width="350" height="200" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <text x="275" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12">1. 计算 QK^T → HBM</text>
    <rect x="150" y="225" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="245" text-anchor="middle" fill="#ef4444" font-size="10">写入显存 (慢)</text>

    <text x="275" y="275" text-anchor="middle" fill="#cbd5e1" font-size="12">2. 读取 QK^T，Softmax → HBM</text>
    <rect x="150" y="285" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="305" text-anchor="middle" fill="#ef4444" font-size="10">再次读写显存 (慢)</text>

    <text x="275" y="335" text-anchor="middle" fill="#cbd5e1" font-size="12">3. 读取 Softmax，乘 V → HBM</text>
    <rect x="150" y="345" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="365" text-anchor="middle" fill="#ef4444" font-size="10">第三次读写显存 (慢)</text>
  </g>

  <g data-code-line="7,8,9,10">
    <text x="500" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Flash Attention (快):</text>
    <rect x="500" y="190" width="350" height="200" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

    <text x="675" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12">1. 分块加载 Q, K, V 到 SRAM</text>
    <rect x="550" y="225" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="245" text-anchor="middle" fill="#10b981" font-size="10">片上内存 (快)</text>

    <text x="675" y="275" text-anchor="middle" fill="#cbd5e1" font-size="12">2. 在线Softmax，分块计算</text>
    <rect x="550" y="285" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="305" text-anchor="middle" fill="#10b981" font-size="10">无需存储完整矩阵</text>

    <text x="675" y="335" text-anchor="middle" fill="#cbd5e1" font-size="12">3. 累积结果，一次写回 HBM</text>
    <rect x="550" y="345" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="365" text-anchor="middle" fill="#10b981" font-size="10">最小化显存访问</text>
  </g>

  <g data-code-line="11,12,13">
    <rect x="100" y="420" width="750" height="140" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="475" y="445" text-anchor="middle" fill="#f59e0b" font-size="13" font-weight="bold">性能提升:</text>

    <text x="120" y="470" fill="#cbd5e1" font-size="11">• 训练速度：2-4倍加速 (长序列更明显)</text>
    <text x="120" y="490" fill="#cbd5e1" font-size="11">• 显存占用：O(N) vs O(N²)，支持更长序列</text>
    <text x="120" y="510" fill="#cbd5e1" font-size="11">• 数学等价：输出与标准Attention完全相同</text>
    <text x="120" y="530" fill="#cbd5e1" font-size="11">• 应用：GPT-4、LLaMA-2、Mistral等主流模型</text>
    <text x="120" y="550" fill="#cbd5e1" font-size="11">• Flash Attention 2: 进一步优化，支持更多硬件</text>
  </g>

  <g data-code-line="14,15,16">
    <rect x="100" y="580" width="750" height="100" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="475" y="605" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">核心技术:</text>

    <text x="120" y="630" fill="#cbd5e1" font-size="11">• Tiling (分块): 将大矩阵分成小块，逐块处理</text>
    <text x="120" y="650" fill="#cbd5e1" font-size="11">• Online Softmax: 增量更新Softmax，无需存储完整QK^T</text>
    <text x="120" y="670" fill="#cbd5e1" font-size="11">• Recomputation: 反向传播时重算，避免存储中间激活</text>
  </g>

  <g transform="translate(50, 705)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：通过分块计算和在线Softmax，最小化HBM访问，大幅加速Attention</text>
  </g>
  <g transform="translate(50, 722)">
    <text x="0" y="0" fill="#64748b" font-size="10">Tri Dao等人提出，现代LLM训练的标配优化</text>
  </g>
</svg>