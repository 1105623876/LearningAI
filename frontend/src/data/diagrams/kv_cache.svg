<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" class="w-full h-auto">
  <defs>
    <linearGradient id="kvcacheGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">KV Cache (键值缓存)</text>

  <g data-code-line="1,2,3">
    <rect x="150" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="450" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">缓存已计算的 Key 和 Value，避免重复计算</text>
    <text x="450" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">自回归生成时，每步只需计算新token的K,V</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">无KV Cache (每步重算):</text>

    <rect x="100" y="190" width="350" height="180" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>

    <text x="275" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 1: "The"</text>
    <rect x="150" y="225" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="245" text-anchor="middle" fill="#94a3b8" font-size="10">计算 K₁, V₁</text>

    <text x="275" y="275" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 2: "The cat"</text>
    <rect x="150" y="285" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="305" text-anchor="middle" fill="#ef4444" font-size="10">重新计算 K₁, V₁, K₂, V₂ ❌</text>

    <text x="275" y="335" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 3: "The cat sat"</text>
    <rect x="150" y="345" width="250" height="30" rx="4" fill="#334155"/>
    <text x="275" y="365" text-anchor="middle" fill="#ef4444" font-size="10">重新计算所有 K, V ❌</text>
  </g>

  <g data-code-line="7,8,9,10">
    <text x="500" y="170" fill="#94a3b8" font-size="14" font-weight="bold">有KV Cache (增量计算):</text>

    <rect x="500" y="190" width="350" height="180" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

    <text x="675" y="215" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 1: "The"</text>
    <rect x="550" y="225" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="245" text-anchor="middle" fill="#94a3b8" font-size="10">计算 K₁, V₁ → 缓存</text>

    <text x="675" y="275" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 2: "cat"</text>
    <rect x="550" y="285" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="305" text-anchor="middle" fill="#10b981" font-size="10">只计算 K₂, V₂ → 追加缓存 ✓</text>

    <text x="675" y="335" text-anchor="middle" fill="#cbd5e1" font-size="12">Step 3: "sat"</text>
    <rect x="550" y="345" width="250" height="30" rx="4" fill="#334155"/>
    <text x="675" y="365" text-anchor="middle" fill="#10b981" font-size="10">只计算 K₃, V₃ → 追加缓存 ✓</text>
  </g>

  <g data-code-line="11,12,13">
    <rect x="100" y="400" width="750" height="120" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="475" y="425" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">内存占用分析:</text>

    <text x="120" y="450" fill="#cbd5e1" font-size="11">• 每个token的KV: 2 × num_layers × num_heads × head_dim × 2 bytes (FP16)</text>
    <text x="120" y="470" fill="#cbd5e1" font-size="11">• 示例 (LLaMA-7B, 32层, 32头, 128维): 每token约 1MB</text>
    <text x="120" y="490" fill="#cbd5e1" font-size="11">• 2048 tokens → 2GB 显存</text>
    <text x="120" y="510" fill="#cbd5e1" font-size="11">• 优化：量化(INT8/INT4)、PagedAttention、MQA/GQA减少头数</text>
  </g>

  <g data-code-line="14,15,16">
    <rect x="100" y="540" width="750" height="80" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="475" y="565" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">加速效果:</text>

    <text x="120" y="590" fill="#cbd5e1" font-size="11">• 无KV Cache: O(n²) 计算复杂度 (n是序列长度)</text>
    <text x="120" y="610" fill="#cbd5e1" font-size="11">• 有KV Cache: O(n) 计算复杂度，生成速度提升10-100倍</text>
  </g>

  <g transform="translate(50, 645)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：缓存历史token的K,V，新token只需计算自己的K,V，大幅加速推理</text>
  </g>
  <g transform="translate(50, 662)">
    <text x="0" y="0" fill="#64748b" font-size="10">vLLM、TGI等推理框架的核心优化技术</text>
  </g>
</svg>