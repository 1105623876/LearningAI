<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" class="w-full h-auto">
  <defs>
    <linearGradient id="encGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="450" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Transformer Encoder Block</text>

  <g data-code-line="1,2,3">
    <rect x="325" y="80" width="250" height="50" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="450" y="110" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Input + Positional Encoding</text>
  </g>

  <path d="M 450 140 L 450 170" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g data-code-line="4,5,6,7">
    <rect x="300" y="170" width="300" height="80" rx="8" fill="url(#encGrad)" opacity="0.9"/>
    <text x="450" y="200" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Multi-Head Attention</text>
    <text x="450" y="220" text-anchor="middle" fill="#ffffff" font-size="12">Self-Attention</text>
    <text x="450" y="238" text-anchor="middle" fill="#cbd5e1" font-size="10">(Q=K=V from input)</text>
  </g>

  <g data-code-line="8,9">
    <path d="M 150 210 L 150 300 L 380 300" stroke="#10b981" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="150" y="250" fill="#10b981" font-size="11" transform="rotate(-90 150 250)">Residual</text>
  </g>

  <path d="M 450 260 L 450 290" stroke="#64748b" stroke-width="2"/>

  <g data-code-line="10,11">
    <circle cx="450" cy="300" r="25" fill="#8b5cf6" opacity="0.9"/>
    <text x="450" y="308" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">+</text>
  </g>

  <path d="M 450 335 L 450 365" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g data-code-line="12,13">
    <rect x="350" y="365" width="200" height="50" rx="6" fill="#334155"/>
    <text x="450" y="395" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">Layer Norm</text>
  </g>

  <path d="M 450 425 L 450 455" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g data-code-line="14,15,16">
    <rect x="300" y="455" width="300" height="80" rx="8" fill="url(#encGrad)" opacity="0.9"/>
    <text x="450" y="485" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Feed-Forward Network</text>
    <text x="450" y="505" text-anchor="middle" fill="#ffffff" font-size="12">Linear → ReLU → Linear</text>
    <text x="450" y="523" text-anchor="middle" fill="#cbd5e1" font-size="10">(d_model → d_ff → d_model)</text>
  </g>

  <g data-code-line="17,18">
    <path d="M 750 495 L 750 585 L 480 585" stroke="#10b981" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="750" y="540" fill="#10b981" font-size="11" transform="rotate(-90 750 540)">Residual</text>
  </g>

  <path d="M 450 545 L 450 575" stroke="#64748b" stroke-width="2"/>

  <g data-code-line="19,20">
    <circle cx="450" cy="585" r="25" fill="#8b5cf6" opacity="0.9"/>
    <text x="450" y="593" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">+</text>
  </g>

  <path d="M 450 620 L 450 650" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g data-code-line="21,22">
    <rect x="350" y="650" width="200" height="50" rx="6" fill="#334155"/>
    <text x="450" y="680" text-anchor="middle" fill="#cbd5e1" font-size="14" font-weight="bold">Layer Norm</text>
  </g>

  <path d="M 450 710 L 450 740" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <g data-code-line="23,24">
    <rect x="325" y="740" width="250" height="50" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="3"/>
    <text x="450" y="770" text-anchor="middle" fill="#a855f7" font-size="14" font-weight="bold">Output to Next Layer</text>
  </g>

  <g transform="translate(50, 810)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心结构：Self-Attention + FFN，每个子层后都有残差连接和LayerNorm</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>