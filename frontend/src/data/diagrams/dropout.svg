<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" class="w-full h-auto">
  <defs>
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="350" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Dropout</text>

  <g data-code-line="1,2">
    <rect x="150" y="60" width="400" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="350" y="95" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">y = x · mask / (1 - p)</text>
    <text x="350" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">p: dropout概率 (通常0.1-0.3)</text>
  </g>

  <g data-code-line="3,4,5">
    <text x="100" y="160" fill="#94a3b8" font-size="14" font-weight="bold">训练时 (p=0.2):</text>
    <rect x="100" y="170" width="250" height="120" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <text x="225" y="195" text-anchor="middle" fill="#cbd5e1" font-size="12">输入神经元:</text>
    <circle cx="150" cy="220" r="15" fill="#10b981"/>
    <circle cx="200" cy="220" r="15" fill="#ef4444" opacity="0.3"/>
    <circle cx="250" cy="220" r="15" fill="#10b981"/>
    <circle cx="300" cy="220" r="15" fill="#10b981"/>

    <text x="150" y="255" text-anchor="middle" fill="#10b981" font-size="10">激活</text>
    <text x="200" y="255" text-anchor="middle" fill="#ef4444" font-size="10">丢弃</text>
    <text x="250" y="255" text-anchor="middle" fill="#10b981" font-size="10">激活</text>
    <text x="300" y="255" text-anchor="middle" fill="#10b981" font-size="10">激活</text>

    <text x="225" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">随机丢弃20%神经元</text>
  </g>

  <g data-code-line="6,7">
    <text x="400" y="160" fill="#94a3b8" font-size="14" font-weight="bold">推理时:</text>
    <rect x="400" y="170" width="250" height="120" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <text x="525" y="195" text-anchor="middle" fill="#cbd5e1" font-size="12">所有神经元:</text>
    <circle cx="450" cy="220" r="15" fill="#10b981"/>
    <circle cx="500" cy="220" r="15" fill="#10b981"/>
    <circle cx="550" cy="220" r="15" fill="#10b981"/>
    <circle cx="600" cy="220" r="15" fill="#10b981"/>

    <text x="525" y="255" text-anchor="middle" fill="#10b981" font-size="10">全部激活</text>
    <text x="525" y="280" text-anchor="middle" fill="#94a3b8" font-size="11">不使用dropout</text>
  </g>

  <g data-code-line="8,9,10">
    <rect x="100" y="320" width="550" height="100" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="375" y="345" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">防止过拟合的机制:</text>

    <text x="120" y="370" fill="#cbd5e1" font-size="11">• 训练时随机丢弃神经元，强制网络学习冗余表示</text>
    <text x="120" y="390" fill="#cbd5e1" font-size="11">• 每次前向传播使用不同的子网络，类似集成学习</text>
    <text x="120" y="410" fill="#cbd5e1" font-size="11">• 推理时使用完整网络，输出更稳定</text>
  </g>

  <g transform="translate(50, 445)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：训练时随机丢弃神经元，防止过拟合，提升泛化能力</text>
  </g>
  <g transform="translate(50, 462)">
    <text x="0" y="0" fill="#64748b" font-size="10">Transformer中通常在Attention和FFN后使用，dropout率0.1</text>
  </g>
</svg>