<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 700" class="w-full h-auto">
  <defs>
    <linearGradient id="causalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Causal Self-Attention (因果自注意力)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">只能看到当前及之前的token，不能看未来</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">通过mask矩阵实现，用于自回归生成</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Attention矩阵 (无mask):</text>
    <rect x="100" y="190" width="280" height="220" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <text x="240" y="220" text-anchor="middle" fill="#cbd5e1" font-size="11">token1 token2 token3 token4</text>

    <rect x="120" y="235" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="170" y="235" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="220" y="235" width="40" height="40" fill="#10b981" opacity="0.4"/>
    <rect x="270" y="235" width="40" height="40" fill="#10b981" opacity="0.2"/>

    <rect x="120" y="285" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="170" y="285" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="220" y="285" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="270" y="285" width="40" height="40" fill="#10b981" opacity="0.4"/>

    <rect x="120" y="335" width="40" height="40" fill="#10b981" opacity="0.4"/>
    <rect x="170" y="335" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="220" y="335" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="270" y="335" width="40" height="40" fill="#10b981" opacity="0.6"/>

    <text x="90" y="260" fill="#cbd5e1" font-size="10">t1</text>
    <text x="90" y="310" fill="#cbd5e1" font-size="10">t2</text>
    <text x="90" y="360" fill="#cbd5e1" font-size="10">t3</text>

    <text x="240" y="395" text-anchor="middle" fill="#ef4444" font-size="11">所有token互相可见 ❌</text>
  </g>

  <g data-code-line="7,8,9,10">
    <text x="420" y="170" fill="#94a3b8" font-size="14" font-weight="bold">Causal Mask (下三角):</text>
    <rect x="420" y="190" width="280" height="220" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

    <text x="560" y="220" text-anchor="middle" fill="#cbd5e1" font-size="11">token1 token2 token3 token4</text>

    <rect x="440" y="235" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="490" y="235" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>
    <rect x="540" y="235" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>
    <rect x="590" y="235" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>

    <rect x="440" y="285" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="490" y="285" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="540" y="285" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>
    <rect x="590" y="285" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>

    <rect x="440" y="335" width="40" height="40" fill="#10b981" opacity="0.4"/>
    <rect x="490" y="335" width="40" height="40" fill="#10b981" opacity="0.6"/>
    <rect x="540" y="335" width="40" height="40" fill="#10b981" opacity="0.8"/>
    <rect x="590" y="335" width="40" height="40" fill="#1e293b" stroke="#ef4444"/>

    <text x="410" y="260" fill="#cbd5e1" font-size="10">t1</text>
    <text x="410" y="310" fill="#cbd5e1" font-size="10">t2</text>
    <text x="410" y="360" fill="#cbd5e1" font-size="10">t3</text>

    <text x="560" y="395" text-anchor="middle" fill="#10b981" font-size="11">只看当前及之前 ✓</text>
  </g>

  <g data-code-line="11,12,13">
    <rect x="100" y="430" width="600" height="120" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="455" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">实现方式:</text>

    <text x="120" y="480" fill="#cbd5e1" font-size="11">1. 计算 QK^T 得到attention分数</text>
    <text x="120" y="500" fill="#cbd5e1" font-size="11">2. 应用causal mask: scores[i, j] = -∞ if j > i</text>
    <text x="120" y="520" fill="#cbd5e1" font-size="11">3. Softmax后，未来位置的权重为0</text>
    <text x="120" y="540" fill="#cbd5e1" font-size="11">4. 用于GPT等自回归模型，保证生成时的因果性</text>
  </g>

  <g data-code-line="14,15">
    <rect x="100" y="570" width="600" height="60" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="400" y="595" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">应用:</text>
    <text x="400" y="615" text-anchor="middle" fill="#cbd5e1" font-size="11">GPT系列、所有decoder-only模型的核心机制</text>
  </g>

  <g transform="translate(50, 645)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：通过mask确保每个token只能看到之前的信息，实现自回归生成</text>
  </g>
</svg>