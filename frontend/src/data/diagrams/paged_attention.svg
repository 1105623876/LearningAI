<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" class="w-full h-auto">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#94a3b8" />
    </marker>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Paged Attention (vLLM)</text>

  <!-- Traditional KV cache -->
  <g data-code-line="1">
    <rect x="50" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
    <text x="215" y="95" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="bold">传统 KV 缓存</text>
    <text x="215" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">连续内存分配</text>
    <text x="215" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">预分配最大长度</text>
    <text x="215" y="160" text-anchor="middle" fill="#ef4444" font-size="11">内存碎片、浪费严重</text>
  </g>

  <!-- Paged Attention -->
  <g data-code-line="2,3,4">
    <rect x="420" y="70" width="330" height="100" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="585" y="95" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Paged Attention</text>
    <text x="585" y="120" text-anchor="middle" fill="#cbd5e1" font-size="12">分页内存管理</text>
    <text x="585" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">按需分配固定大小块</text>
    <text x="585" y="160" text-anchor="middle" fill="#10b981" font-size="11">内存利用率接近 100%</text>
  </g>

  <!-- Physical pages -->
  <g data-code-line="5,6">
    <rect x="100" y="200" width="600" height="100" rx="8" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="225" text-anchor="middle" fill="#8b5cf6" font-size="14" font-weight="bold">物理页池 (k_pages, v_pages)</text>
    <text x="400" y="250" text-anchor="middle" fill="#cbd5e1" font-size="12">固定大小的 KV 块: (num_blocks, block_size, D)</text>
    <text x="400" y="270" text-anchor="middle" fill="#94a3b8" font-size="11">例如: block_size=16, 每块存储 16 个 token 的 K/V</text>
    <text x="400" y="290" text-anchor="middle" fill="#10b981" font-size="11">所有序列共享物理页池</text>
  </g>

  <!-- Block table -->
  <g data-code-line="7,8">
    <line x1="400" y1="300" x2="400" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="340" width="600" height="120" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="365" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">块表 (Block Table)</text>
    <text x="400" y="390" text-anchor="middle" fill="#cbd5e1" font-size="12">逻辑块 → 物理块的映射</text>
    <text x="400" y="410" text-anchor="middle" fill="#94a3b8" font-size="11">block_table[b]: 序列 b 的物理块索引列表</text>
    <text x="400" y="430" text-anchor="middle" fill="#10b981" font-size="11">例如: [3, 7, 12] 表示序列使用物理块 3, 7, 12</text>
    <text x="400" y="450" text-anchor="middle" fill="#94a3b8" font-size="11">类似操作系统的页表</text>
  </g>

  <!-- Gather and compute -->
  <g data-code-line="9,10,11">
    <line x1="400" y1="460" x2="400" y2="490" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <rect x="100" y="500" width="600" height="100" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <text x="400" y="525" text-anchor="middle" fill="#f59e0b" font-size="14" font-weight="bold">注意力计算</text>
    <text x="400" y="550" text-anchor="middle" fill="#cbd5e1" font-size="12">1. 根据 block_table 收集 K, V 块</text>
    <text x="400" y="570" text-anchor="middle" fill="#cbd5e1" font-size="12">2. 截取到实际长度 context_len</text>
    <text x="400" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12">3. 计算 Attention(Q, K_gathered, V_gathered)</text>
  </g>

  <!-- Key insight -->
  <g data-code-line="1,2,3">
    <rect x="50" y="630" width="700" height="100" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="655" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">核心思想</text>
    <text x="400" y="680" text-anchor="middle" fill="#cbd5e1" font-size="12">借鉴操作系统虚拟内存，将 KV 缓存分页管理</text>
    <text x="400" y="700" text-anchor="middle" fill="#cbd5e1" font-size="12">消除内存碎片，支持高效的序列共享和动态批处理</text>
  </g>
</svg>
