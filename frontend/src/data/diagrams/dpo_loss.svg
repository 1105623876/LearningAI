<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="w-full h-auto">
  <defs>
    <linearGradient id="dpoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">DPO (Direct Preference Optimization)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">直接优化偏好，无需奖励模型和RL</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">简化RLHF流程，更稳定高效</text>
  </g>

  <g data-code-line="4,5,6">
    <rect x="100" y="160" width="600" height="100" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
    <text x="400" y="190" text-anchor="middle" fill="#3b82f6" font-size="14" font-weight="bold">DPO Loss:</text>
    <text x="400" y="220" text-anchor="middle" fill="#f1f5f9" font-size="15" font-family="monospace">L = -log σ(β log(π_θ(y_w|x)/π_ref(y_w|x)) - β log(π_θ(y_l|x)/π_ref(y_l|x)))</text>
    <text x="400" y="245" text-anchor="middle" fill="#94a3b8" font-size="11">y_w: 偏好回答, y_l: 非偏好回答, β: 温度参数</text>
  </g>

  <g data-code-line="7,8,9">
    <text x="100" y="300" fill="#94a3b8" font-size="14" font-weight="bold">训练数据 (偏好对):</text>
    <rect x="100" y="320" width="600" height="140" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <rect x="120" y="340" width="660" height="30" rx="4" fill="#334155"/>
    <text x="450" y="360" text-anchor="middle" fill="#cbd5e1" font-size="11">Prompt: "解释量子计算"</text>

    <rect x="120" y="380" width="660" height="30" rx="4" fill="#10b981" opacity="0.3"/>
    <text x="450" y="400" text-anchor="middle" fill="#10b981" font-size="10">✓ 偏好: "量子计算利用量子叠加和纠缠..." (清晰准确)</text>

    <rect x="120" y="420" width="660" height="30" rx="4" fill="#ef4444" opacity="0.3"/>
    <text x="450" y="440" text-anchor="middle" fill="#ef4444" font-size="10">✗ 非偏好: "量子计算就是很快的计算机" (不准确)</text>
  </g>

  <g data-code-line="10,11,12">
    <rect x="100" y="480" width="280" height="100" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="240" y="505" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">RLHF (传统):</text>
    <text x="120" y="530" fill="#cbd5e1" font-size="10">1. 训练奖励模型</text>
    <text x="120" y="550" fill="#cbd5e1" font-size="10">2. 用PPO优化策略</text>
    <text x="120" y="570" fill="#ef4444" font-size="10">复杂、不稳定</text>
  </g>

  <g data-code-line="13,14,15">
    <rect x="420" y="480" width="280" height="100" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="560" y="505" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">DPO (新方法):</text>
    <text x="440" y="530" fill="#cbd5e1" font-size="10">1. 直接优化偏好对</text>
    <text x="440" y="550" fill="#cbd5e1" font-size="10">2. 无需奖励模型和RL</text>
    <text x="440" y="570" fill="#10b981" font-size="10">简单、稳定、高效</text>
  </g>

  <g transform="translate(50, 605)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：直接从偏好数据优化策略，跳过奖励建模和RL，简化RLHF流程</text>
  </g>
</svg>