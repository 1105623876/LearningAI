<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 680" class="w-full h-auto">
  <defs>
    <linearGradient id="linearGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Linear Layer</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="18" font-family="monospace">y = xW^T + b</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">全连接层，线性变换</text>
  </g>

  <g data-code-line="4,5">
    <rect x="300" y="160" width="200" height="50" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>
    <text x="400" y="190" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold">Input x (batch, in_features)</text>
  </g>

  <g data-code-line="6,7,8">
    <path d="M 400 220 L 400 250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="200" y="250" width="400" height="120" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="280" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">权重矩阵 W (out_features, in_features)</text>

    <text x="400" y="310" text-anchor="middle" fill="#cbd5e1" font-size="12">例: (512, 2048)</text>
    <text x="400" y="330" text-anchor="middle" fill="#94a3b8" font-size="11">每个输出神经元连接所有输入</text>
    <text x="400" y="350" text-anchor="middle" fill="#94a3b8" font-size="11">参数量 = in_features × out_features + out_features</text>
  </g>

  <g data-code-line="9,10">
    <path d="M 400 380 L 400 410" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="250" y="410" width="300" height="60" rx="6" fill="url(#linearGrad)" opacity="0.9"/>
    <text x="400" y="435" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">矩阵乘法 + 偏置</text>
    <text x="400" y="455" text-anchor="middle" fill="#cbd5e1" font-size="11">y = xW^T + b</text>
  </g>

  <g data-code-line="11,12">
    <path d="M 400 480 L 400 510" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="510" width="200" height="50" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="3"/>
    <text x="400" y="540" text-anchor="middle" fill="#10b981" font-size="14" font-weight="bold">Output (batch, out_features)</text>
  </g>

  <g data-code-line="13,14">
    <rect x="100" y="580" width="600" height="60" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="400" y="605" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">示例:</text>
    <text x="400" y="625" text-anchor="middle" fill="#cbd5e1" font-size="11">输入(32, 512) × 权重(2048, 512)^T + 偏置(2048) = 输出(32, 2048)</text>
  </g>

  <g transform="translate(50, 655)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：全连接层，每个输出与所有输入相连，Transformer的基础组件</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
</svg>