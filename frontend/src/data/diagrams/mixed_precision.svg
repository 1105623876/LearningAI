<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" class="w-full h-auto">
  <defs>
    <linearGradient id="bfGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-size="24" font-weight="bold">Mixed Precision Training (混合精度训练)</text>

  <g data-code-line="1,2,3">
    <rect x="100" y="60" width="600" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <text x="400" y="90" text-anchor="middle" fill="#f1f5f9" font-size="16" font-family="monospace">FP16计算 + FP32累积，加速训练</text>
    <text x="400" y="115" text-anchor="middle" fill="#94a3b8" font-size="13">减少显存占用，提升吞吐量</text>
  </g>

  <g data-code-line="4,5,6">
    <text x="100" y="170" fill="#94a3b8" font-size="14" font-weight="bold">FP32 (标准精度):</text>
    <rect x="100" y="190" width="300" height="120" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="2"/>

    <text x="250" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">32位浮点数</text>
    <text x="250" y="245" text-anchor="middle" fill="#94a3b8" font-size="11">范围: ±3.4×10³⁸</text>
    <text x="250" y="265" text-anchor="middle" fill="#94a3b8" font-size="11">精度: 7位有效数字</text>
    <text x="250" y="285" text-anchor="middle" fill="#ef4444" font-size="11">显存: 4 bytes/参数</text>
  </g>

  <g data-code-line="7,8,9">
    <text x="450" y="170" fill="#94a3b8" font-size="14" font-weight="bold">FP16 (半精度):</text>
    <rect x="450" y="190" width="300" height="120" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>

    <text x="600" y="220" text-anchor="middle" fill="#cbd5e1" font-size="12">16位浮点数</text>
    <text x="600" y="245" text-anchor="middle" fill="#94a3b8" font-size="11">范围: ±6.5×10⁴</text>
    <text x="600" y="265" text-anchor="middle" fill="#94a3b8" font-size="11">精度: 3位有效数字</text>
    <text x="600" y="285" text-anchor="middle" fill="#10b981" font-size="11">显存: 2 bytes/参数 (节省50%)</text>
  </g>

  <g data-code-line="10,11,12,13">
    <rect x="100" y="330" width="650" height="140" rx="6" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
    <text x="425" y="355" text-anchor="middle" fill="#a855f7" font-size="13" font-weight="bold">混合精度策略:</text>

    <text x="120" y="380" fill="#cbd5e1" font-size="11">• 前向传播: FP16 (快速计算)</text>
    <text x="120" y="400" fill="#cbd5e1" font-size="11">• 反向传播: FP16 (快速计算)</text>
    <text x="120" y="420" fill="#cbd5e1" font-size="11">• 梯度累积: FP32 (避免精度损失)</text>
    <text x="120" y="440" fill="#cbd5e1" font-size="11">• 参数更新: FP32 master weights (保持精度)</text>
    <text x="120" y="460" fill="#cbd5e1" font-size="11">• Loss Scaling: 放大loss避免梯度下溢</text>
  </g>

  <g data-code-line="14,15,16">
    <rect x="100" y="490" width="650" height="80" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="2"/>
    <text x="425" y="515" text-anchor="middle" fill="#10b981" font-size="13" font-weight="bold">性能提升:</text>

    <text x="120" y="540" fill="#cbd5e1" font-size="11">• 训练速度: 2-3倍加速 (Tensor Core加速)</text>
    <text x="120" y="560" fill="#cbd5e1" font-size="11">• 显存占用: 减少约50%，支持更大batch size</text>
  </g>

  <g transform="translate(50, 595)">
    <text x="0" y="0" fill="#94a3b8" font-size="11">核心思想：用FP16加速计算，用FP32保证精度，兼顾速度和质量</text>
  </g>
</svg>