<h2>你希望这个可视化学习程序达到什么效果？</h2>
<p class="subtitle">帮我理解你的核心学习目标</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>知识地图导航</h3>
      <p>看到所有知识点的关系网络，像地图一样探索学习路径，清楚地知道学什么、先学什么</p>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>概念深度理解</h3>
      <p>通过动画、图解等方式直观理解每个知识点的原理（比如注意力机制怎么工作、梯度如何反向传播）</p>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>进度追踪 + 推荐</h3>
      <p>记录学习进度，智能推荐下一步该学什么，像游戏升级一样有成就感</p>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>以上都要</h3>
      <p>一个综合性的学习平台，包含知识地图、概念可视化、进度追踪等多个功能</p>
    </div>
  </div>
</div>
