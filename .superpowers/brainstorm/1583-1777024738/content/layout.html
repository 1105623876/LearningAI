<h2>界面布局方面，你希望如何组织这些知识点？</h2>
<p class="subtitle">68 个知识点需要清晰的导航和组织方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>按学习路径分组</h3>
      <p>左侧显示 8 条学习路径（Transformer 内部机制、注意力与位置编码等），点击路径展开其中的知识点</p>
      <div class="label">适合有明确学习目标的用户</div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>按知识类别分组</h3>
      <p>按基础、归一化、注意力、架构、训练等类别组织，类似文档目录结构</p>
      <div class="label">适合查找特定类型的知识点</div>
    </div>
  </div>

  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>知识图谱可视化</h3>
      <p>用节点和连线展示知识点之间的依赖关系，点击节点进入详情页</p>
      <div class="label">直观但开发复杂，适合探索式学习</div>
    </div>
  </div>

  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>混合导航（推荐）</h3>
      <p>主界面是知识图谱，左侧提供路径/类别的快速导航，两种方式互补</p>
      <div class="label">灵活但需要设计好交互</div>
    </div>
  </div>
</div>
